<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研人才 Mapping Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #1d1d1f;
            line-height: 1.6;
        }

        /* ============= 主容器 ============= */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* ============= 顶部导航栏 ============= */
        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid #f5f5f7;
            background: #ffffff;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #000000 0%, #333333 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 13px;
            color: #666666;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #f5f5f7;
            border-radius: 16px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ============= 主内容区 ============= */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ============= 左侧面板 ============= */
        .sidebar {
            width: 380px;
            border-right: 1px solid #f5f5f7;
            display: flex;
            flex-direction: column;
            background: #fafafa;
            overflow-y: auto;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        /* ============= 搜索面板 ============= */
        .search-panel {
            padding: 32px 28px;
            border-bottom: 1px solid #f5f5f7;
        }

        .search-title {
            font-size: 14px;
            font-weight: 500;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 600;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 15px;
            background: white;
            transition: all 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        input[type="text"]:placeholder {
            color: #a1a1a6;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.1);
        }

        input[type="text"]:hover:not(:focus) {
            border-color: #b0b0b5;
        }

        /* ============= 提示文字 ============= */
        .input-hint {
            font-size: 11px;
            color: #a1a1a6;
            margin-top: 4px;
            font-weight: 400;
        }

        /* ============= 搜索按钮 ============= */
        .search-button {
            width: 100%;
            padding: 12px 16px;
            margin-top: 8px;
            background: #000000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .search-button:hover {
            background: #1d1d1f;
        }

        .search-button:active {
            transform: scale(0.98);
        }

        .search-button.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ============= 历史记录 ============= */
        .history-section {
            padding: 28px 28px 0;
            flex: 1;
            overflow-y: auto;
        }

        .history-title {
            font-size: 14px;
            font-weight: 500;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .history-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #e5e5e7;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            color: #1d1d1f;
        }

        .history-item:hover {
            background: #f5f5f7;
            border-color: #d2d2d7;
        }

        .history-item-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .history-item-school {
            font-size: 12px;
            color: #a1a1a6;
        }

        /* ============= 右侧聊天区 ============= */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 24px 40px;
            border-bottom: 1px solid #f5f5f7;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-header-title {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 6px;
        }

        .chat-header-subtitle {
            font-size: 13px;
            color: #a1a1a6;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: white;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #000000;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: #f5f5f7;
            color: #1d1d1f;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 12px;
            color: #a1a1a6;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: #d2d2d7;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        /* ============= 空状态 ============= */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 24px;
            color: #a1a1a6;
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
            text-align: center;
            max-width: 300px;
        }

        /* ============= 响应式 ============= */
        @media (max-width: 1200px) {
            .sidebar {
                width: 320px;
            }
            
            .search-panel {
                padding: 24px 20px;
            }

            .chat-header {
                padding: 20px 32px;
            }

            .messages-container {
                padding: 24px 32px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 20px;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #f5f5f7;
                max-height: 200px;
            }

            .main {
                flex-direction: column;
            }

            .chat-area {
                flex: 1;
            }

            .message-bubble {
                max-width: 90%;
            }

            .chat-header {
                padding: 16px 20px;
            }

            .messages-container {
                padding: 16px 20px;
            }
        }

        /* ============= 滚动条样式 ============= */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d2d2d7;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999999;
        }

        /* ============= 统计卡片 ============= */
        .stats-card {
            background: white;
            border: 1px solid #e5e5e7;
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            font-size: 13px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f7;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #a1a1a6;
        }

        .stat-value {
            font-weight: 600;
            color: #1d1d1f;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">◆</div>
                <span>科研人才 Mapping Agent</span>
            </div>
            <div class="header-right">
                <div class="status-badge">
                    <div class="status-dot"></div>
                    <span>连接中</span>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main">
            <!-- 左侧面板 -->
            <div class="sidebar">
                <div class="sidebar-content">
                    <!-- 搜索面板 -->
                    <div class="search-panel">
                        <div class="search-title">搜索</div>
                        <div class="search-box">
                            <div class="input-group">
                                <label class="input-label">研究者信息</label>
                                <input 
                                    type="text" 
                                    id="searchInput"
                                    placeholder="例如：zhihua zhou nju"
                                    autocomplete="off"
                                >
                                <div class="input-hint">Enter the name and school</div>
                            </div>
                            <button class="search-button" id="searchButton">开始评估</button>
                        </div>
                    </div>

                    <!-- 历史记录 -->
                    <div class="history-section">
                        <div class="history-title">最近搜索</div>
                        <div id="historyList">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧聊天区 -->
            <div class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-title" id="chatTitle">欢迎使用</div>
                    <div class="chat-header-subtitle" id="chatSubtitle">在左侧输入相关研究者信息开始评估</div>
                </div>
                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-text">输入研究者姓名和所在学校，获取学术成就评估报告</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============= 配置 =============
        const N8N_WEBHOOK_URL = 'https://lamb20260406.app.n8n.cloud/webhook/3bc48f3e-2a46-4475-8e3b-d2dccd2b7c0bE'; // 替换为你的 n8n Webhook URL

        // ============= 状态管理 =============
        let isLoading = false;
        let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');

        // ============= DOM 元素 =============
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const messagesContainer = document.getElementById('messagesContainer');
        const chatTitle = document.getElementById('chatTitle');
        const chatSubtitle = document.getElementById('chatSubtitle');
        const historyList = document.getElementById('historyList');

        // ============= 初始化 =============
        function init() {
            renderHistory();
            setupEventListeners();
        }

        // ============= 事件监听 =============
        function setupEventListeners() {
            // Enter 键搜索
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !isLoading) {
                    performSearch();
                }
            });

            // 按钮点击
            searchButton.addEventListener('click', performSearch);
        }

        // ============= 执行搜索 =============
        async function performSearch() {
            const query = searchInput.value.trim();
            
            if (!query) {
                alert('请输入研究者信息');
                return;
            }

            if (isLoading) return;

            isLoading = true;
            searchButton.classList.add('loading');
            searchButton.textContent = '处理中...';

            // 添加到历史记录
            addToHistory(query);

            // 清空消息容器
            messagesContainer.innerHTML = '';

            // 显示用户消息
            addMessage(query, 'user');

            // 显示加载动画
            addLoadingMessage();

            try {
                // 调用 n8n Webhook
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chatMessage: query,
                        sessionId: generateSessionId()
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 移除加载消息
                removeLoadingMessage();

                // 显示响应
                if (data.response || data.analysis) {
                    const responseText = data.response || data.analysis;
                    addMessage(responseText, 'assistant');

                    // 更新标题
                    const author = data.author || '评估结果';
                    chatTitle.textContent = author;
                    chatSubtitle.textContent = `${data.university || ''}的学术评估`;

                    // 显示统计卡片
                    if (data.statistics) {
                        addStatsCard(data.statistics);
                    }
                } else {
                    addMessage('未能获取评估结果，请重试', 'assistant');
                }

            } catch (error) {
                console.error('Error:', error);
                removeLoadingMessage();
                addMessage(`出错: ${error.message}。请检查 n8n Webhook URL 是否正确配置。`, 'assistant');
            } finally {
                isLoading = false;
                searchButton.classList.remove('loading');
                searchButton.textContent = '开始评估';
            }
        }

        // ============= 消息相关函数 =============
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            messageDiv.appendChild(bubble);
            messageDiv.appendChild(time);
            messagesContainer.appendChild(messageDiv);

            // 自动滚动到底部
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'loadingMessage';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            const dots = document.createElement('div');
            dots.className = 'loading-dots';
            dots.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';

            bubble.appendChild(dots);
            messageDiv.appendChild(bubble);
            messagesContainer.appendChild(messageDiv);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMsg = document.getElementById('loadingMessage');
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }

        function addStatsCard(stats) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'stats-card';

            const rows = [
                { label: '总论文数', value: stats.total_papers || 0 },
                { label: 'CCF-A 一作/共一', value: stats.ccf_a_first_author || 0 + ' 篇' },
                { label: 'CCF-A 其他身份', value: stats.ccf_a_other_author || 0 + ' 篇' },
                { label: '非 CCF-A', value: stats.non_ccf_a || 0 + ' 篇' }
            ];

            cardDiv.innerHTML = rows.map(row => `
                <div class="stat-row">
                    <span class="stat-label">${row.label}</span>
                    <span class="stat-value">${row.value}</span>
                </div>
            `).join('');

            messagesContainer.appendChild(cardDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ============= 历史记录相关 =============
        function addToHistory(query) {
            // 从查询中提取名字和学校
            const parts = query.split(/[\s，,]+/);
            if (parts.length >= 2) {
                const item = {
                    name: parts[0],
                    university: parts[1],
                    query: query,
                    timestamp: new Date().toISOString()
                };

                // 避免重复
                searchHistory = searchHistory.filter(h => h.query !== query);
                searchHistory.unshift(item);

                // 只保留最近 10 条
                searchHistory = searchHistory.slice(0, 10);

                localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                renderHistory();
            }
        }

        function renderHistory() {
            historyList.innerHTML = searchHistory.map((item, index) => `
                <div class="history-item" onclick="selectFromHistory('${item.query}')">
                    <div class="history-item-name">${item.name}</div>
                    <div class="history-item-school">${item.university}</div>
                </div>
            `).join('');
        }

        function selectFromHistory(query) {
            searchInput.value = query;
            performSearch();
        }

        // ============= 工具函数 =============
        function generateSessionId() {
            return 'session_' + Math.random().toString(36).substr(2, 9);
        }

        // ============= 启动应用 =============
        init();
    </script>
</body>
</html>
