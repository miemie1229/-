<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>科研人才 Mapping Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #1d1d1f;
      line-height: 1.6;
    }

    .container { display: flex; flex-direction: column; height: 100vh; position: relative; }

    .header {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-bottom: 1px solid #f5f5f7;
      background: #ffffff;
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #000000 0%, #333333 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
    }

    .header-right { display: flex; align-items: center; gap: 24px; font-size: 13px; color: #666666; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: #f5f5f7;
      border-radius: 16px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px; height: 8px; background: #34c759; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .main { flex: 1; display: flex; overflow: hidden; }

    .sidebar {
      width: 380px;
      border-right: 1px solid #f5f5f7;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      overflow-y: auto;
    }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 0; }

    .search-panel { padding: 32px 28px; border-bottom: 1px solid #f5f5f7; }

    .search-title {
      font-size: 14px; font-weight: 500; color: #999999;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .search-box { display: flex; flex-direction: column; gap: 16px; }

    .input-group { display: flex; flex-direction: column; gap: 8px; }

    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* 改一下：输入 + 按钮一体化布局 */
    .search-actions { display: flex; gap: 12px; align-items: stretch; }
    .input-wrapper { position: relative; display: flex; flex: 1; }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      transition: all 0.2s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    input[type="text"]::placeholder { color: #a1a1a6; }
    input[type="text"]:focus {
      outline: none;
      border-color: #000000;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
    }

    .input-hint { font-size: 11px; color: #a1a1a6; margin-top: 4px; font-weight: 400; }

    .search-button {
      width: 108px;
      padding: 12px 0;
      background: #000000;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .search-button:hover { background: #1d1d1f; }
    .search-button:active { transform: scale(0.99); }
    .search-button.loading { opacity: 0.65; cursor: not-allowed; }

    .history-section { padding: 28px 28px 0; flex: 1; overflow-y: auto; }
    .history-title {
      font-size: 14px; font-weight: 500; color: #999999;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .history-item {
      padding: 12px 16px;
      margin-bottom: 8px;
      background: white;
      border: 1px solid #e5e5e7;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 13px;
      color: #1d1d1f;
    }
    .history-item:hover { background: #f5f5f7; border-color: #d2d2d7; }
    .history-item-name { font-weight: 500; margin-bottom: 4px; }
    .history-item-school { font-size: 12px; color: #a1a1a6; }

    .chat-area { flex: 1; display: flex; flex-direction: column; background: white; }

    .chat-header {
      padding: 24px 40px;
      border-bottom: 1px solid #f5f5f7;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .chat-header-title { font-size: 24px; font-weight: 600; color: #1d1d1f; }
    .chat-header-subtitle { font-size: 13px; color: #a1a1a6; }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: white;
    }

    .message { display: flex; flex-direction: column; gap: 8px; animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }

    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user .message-bubble {
      background: #000000; color: white;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .message-bubble {
      background: #f5f5f7; color: #1d1d1f;
      border-bottom-left-radius: 4px;
    }

    .message-time { font-size: 12px; color: #a1a1a6; }

    .loading-dots { display: flex; gap: 4px; }
    .loading-dot { width: 8px; height: 8px; background: #d2d2d7; border-radius: 50%; animation: bounce 1.4s infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 24px; color: #a1a1a6; text-align: center;
    }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-text { font-size: 15px; max-width: 360px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    .stats-card {
      background: white;
      border: 1px solid #e5e5e7;
      border-radius: 12px;
      padding: 16px;
    }

    .stat-row {
      display: flex; justify-content: space-between; padding: 8px 0;
      border-bottom: 1px solid #f5f5f7;
      font-size: 13px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #a1a1a6; }
    .stat-value { font-weight: 700; color: #1d1d1f; }

    .chart-card { padding: 16px; }
    .chart-title { font-size: 13px; color: #666; font-weight: 600; margin-bottom: 10px; }
    canvas { width: 100%; height: 220px; display: block; background: #ffffff; border-radius: 10px; }

    /* 响应式 */
    @media (max-width: 1200px) {
      .sidebar { width: 320px; }
      .search-panel { padding: 24px 20px; }
      .chat-header { padding: 20px 32px; }
      .messages-container { padding: 24px 32px; }
    }
    @media (max-width: 768px) {
      .header { padding: 0 20px; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #f5f5f7; max-height: 240px; }
      .main { flex-direction: column; }
      .chat-area { flex: 1; }
      .message-bubble { max-width: 90%; }
      .chat-header { padding: 16px 20px; }
      .messages-container { padding: 16px 20px; }
      .search-actions { gap: 10px; }
      .search-button { width: 96px; }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #999999; }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">◆</div>
        <span>科研人才 Mapping Agent</span>
      </div>
      <div class="header-right">
        <div class="status-badge">
          <div class="status-dot"></div>
          <span>连接中</span>
        </div>
      </div>
    </div>

    <div class="main">
      <!-- 左侧面板 -->
      <div class="sidebar">
        <div class="sidebar-content">
          <!-- 搜索面板 -->
          <div class="search-panel">
            <div class="search-title">搜索</div>

            <div class="search-box">
              <div class="input-group">
                <label class="input-label">研究者信息</label>
                <div class="search-actions">
                  <div class="input-wrapper">
                    <input
                      type="text"
                      id="searchInput"
                      placeholder="例如：guozhen zhang nju"
                      autocomplete="off"
                    />
                  </div>
                  <button id="searchBtn" class="search-button" type="button">搜索</button>
                </div>
                <div class="input-hint">Enter the name and school</div>
              </div>
            </div>
          </div>

          <!-- 历史记录 -->
          <div class="history-section">
            <div class="history-title">最近搜索</div>
            <div id="historyList"></div>
          </div>
        </div>
      </div>

      <!-- 右侧聊天区 -->
      <div class="chat-area">
        <div class="chat-header">
          <div class="chat-header-title" id="chatTitle">欢迎使用</div>
          <div class="chat-header-subtitle" id="chatSubtitle">在左侧输入相关研究者信息开始评估</div>
        </div>

        <div class="messages-container" id="messagesContainer">
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-text">输入研究者姓名和所在学校，获取学术成就评估报告</div>
          </div>
        </div>
      </div>
    </div>
  </div>

 <script>
  const WORKER_URL = "https://weathered-lab-9d3f.8f3va2ehrl.workers.dev";

  let isLoading = false;
  let searchHistory = JSON.parse(localStorage.getItem("searchHistory") || "[]");

  const searchInput = document.getElementById("searchInput");
  const searchBtn = document.getElementById("searchBtn");
  const messagesContainer = document.getElementById("messagesContainer");
  const chatTitle = document.getElementById("chatTitle");
  const chatSubtitle = document.getElementById("chatSubtitle");
  const historyList = document.getElementById("historyList");

  function init() {
    renderHistory();
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !isLoading) performSearch();
    });
    searchBtn.addEventListener("click", performSearch);
  }

  function setLoading(loading) {
    isLoading = loading;
    if (loading) {
      searchBtn.classList.add("loading");
      searchBtn.textContent = "处理中...";
    } else {
      searchBtn.classList.remove("loading");
      searchBtn.textContent = "搜索";
    }
  }

  function addMessage(text, sender) {
    const messageDiv = document.createElement("div");
    messageDiv.className = `message ${sender}`;

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    bubble.textContent = String(text);

    const time = document.createElement("div");
    time.className = "message-time";
    time.textContent = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });

    messageDiv.appendChild(bubble);
    messageDiv.appendChild(time);

    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function addLoadingMessage() {
    const messageDiv = document.createElement("div");
    messageDiv.className = "message assistant";
    messageDiv.id = "loadingMessage";

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";

    const dots = document.createElement("div");
    dots.className = "loading-dots";
    dots.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';

    bubble.appendChild(dots);
    messageDiv.appendChild(bubble);
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function removeLoadingMessage() {
    const el = document.getElementById("loadingMessage");
    if (el) el.remove();
  }

  function parsePayload(text) {
    // n8n/worker 可能返回纯 JSON，也可能返回 JSON 字符串；这里统一处理
    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch {
      return { payload: null, raw: text };
    }

    if (Array.isArray(parsed)) return { payload: parsed[0], raw: text };
    if (parsed && typeof parsed === "object") return { payload: parsed, raw: text };
    return { payload: null, raw: text };
  }

  async function performSearch() {
    const text = (searchInput.value || "").trim();
    if (!text) return alert("请输入研究者信息");

    if (isLoading) return;
    setLoading(true);

    addToHistory(text);
    messagesContainer.innerHTML = "";
    addMessage(text, "user");
    addLoadingMessage();

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const raw = await res.text();
      const { payload } = parsePayload(raw);

      removeLoadingMessage();

      if (!res.ok) {
        addMessage("请求失败：HTTP " + res.status, "assistant");
        if (raw) addPreBlock("返回内容（原样）：\n" + raw);
        return;
      }

      if (!payload) {
        addMessage("返回内容不是有效 JSON（或为空）", "assistant");
        addPreBlock("原始返回：\n" + raw);
        return;
      }

      renderN8nResult(payload);
    } catch (e) {
      removeLoadingMessage();
      addMessage("请求失败：" + e.message, "assistant");
    } finally {
      setLoading(false);
    }
  }

  function renderN8nResult(data) {
    // 标题
    const title = data.target_scholar || data.author_name || "评估结果";
    const sub = data.university || data.university_name || "科研人才 mapping 统计";
    chatTitle.textContent = "评估结果：" + title;
    chatSubtitle.textContent = sub;

    // 基本统计
    if (data.total_papers != null || data.identified_count != null || data.need_ai_count != null) {
      addStatsCard({
        rows: [
          { label: "总论文数", value: data.total_papers ?? 0 },
          { label: "已识别数量", value: data.identified_count ?? 0 },
          { label: "需要 AI 统计", value: data.need_ai_count ?? 0 }
        ]
      });
    } else {
      addMessage("已获取评估结果（见下方详情）", "assistant");
    }

    // stats 详细（A/B/C/NON）
    if (data.stats && typeof data.stats === "object") {
      const keys = ["A", "B", "C", "NON"];
      addTableCard(keys.map(k => {
        const s = data.stats[k] || {};
        return {
          label: k,
          type: s.type || "-",
          level: s.level || "-",
          count: s.count ?? 0
        };
      }));
    }

    // report_table（你的截图里那种整表文本）
    if (data.report_table) {
      addPreBlock("报告表：\n" + data.report_table);
    }
  }

  function addStatsCard({ rows }) {
    const card = document.createElement("div");
    card.className = "stats-card";

    card.innerHTML = rows.map(r => `
      <div class="stat-row">
        <span class="stat-label">${escapeHtml(r.label)}</span>
        <span class="stat-value">${escapeHtml(String(r.value))}</span>
      </div>
    `).join("");

    messagesContainer.appendChild(card);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function addTableCard(items) {
    const card = document.createElement("div");
    card.className = "stats-card";
    const header = document.createElement("div");
    header.style.fontWeight = "700";
    header.style.marginBottom = "10px";
    header.style.color = "#1d1d1f";
    header.textContent = "CCF 分布详情（来自 n8n stats）";
    card.appendChild(header);

    const table = document.createElement("div");
    table.style.display = "grid";
    table.style.gridTemplateColumns = "70px 1fr 1fr 80px";
    table.style.gap = "8px 10px";

    // 表头
    ["等级", "类型", "层级", "数量"].forEach((t) => {
      const th = document.createElement("div");
      th.style.color = "#a1a1a6";
      th.style.fontSize = "12px";
      th.textContent = t;
      table.appendChild(th);
    });

    items.forEach((it) => {
      const cells = [it.label, it.type, it.level, String(it.count)];
      cells.forEach((c, idx) => {
        const td = document.createElement("div");
        td.style.color = idx === 3 ? "#1d1d1f" : "#666";
        td.style.fontSize = "13px";
        td.style.fontWeight = idx === 3 ? "700" : "500";
        td.textContent = String(c);
        table.appendChild(td);
      });
    });

    card.appendChild(table);
    messagesContainer.appendChild(card);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function addPreBlock(text) {
    const pre = document.createElement("pre");
    pre.style.whiteSpace = "pre-wrap";
    pre.style.wordBreak = "break-word";
    pre.style.background = "#fafafa";
    pre.style.border = "1px solid #e5e5e7";
    pre.style.borderRadius = "12px";
    pre.style.padding = "16px";
    pre.style.marginTop = "6px";
    pre.style.color = "#1d1d1f";
    pre.style.fontSize = "13px";
    pre.textContent = String(text);

    messagesContainer.appendChild(pre);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function addToHistory(query) {
    const { name, university } = parseQueryForHistory(query);

    const item = { name, university, query, timestamp: new Date().toISOString() };
    searchHistory = searchHistory.filter(h => h.query !== query);
    searchHistory.unshift(item);
    searchHistory = searchHistory.slice(0, 10);

    localStorage.setItem("searchHistory", JSON.stringify(searchHistory));
    renderHistory();
  }

  function parseQueryForHistory(query) {
    const parts = (query || "").split(/[\s，,]+/).filter(Boolean);
    const name = parts[0] || query;
    const university = parts.slice(1).join(" ");
    return { name, university };
  }

  function renderHistory() {
    historyList.innerHTML = "";
    searchHistory.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      const name = escapeHtml(item.name || "");
      const uni = escapeHtml(item.university || "");
      div.innerHTML = `
        <div class="history-item-name">${name}</div>
        <div class="history-item-school">${uni}</div>
      `;
      div.addEventListener("click", () => {
        searchInput.value = item.query;
        performSearch();
      });
      historyList.appendChild(div);
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (m) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[m]));
  }

  init();
</script>
</body>
</html>
